name: Check South HS classes

on:
  schedule:
    # Heartbeat fallback only — cron-job.org dispatches the real cadence (every
    # 5 min via workflow_dispatch). This GitHub cron exists so that if the
    # external scheduler dies (PAT expired, account deleted, outage), we still
    # get a run every 2 hours during the day to catch changes and surface the
    # zero-class alert if the scraper breaks.
    - cron: '0 10-23/2 * * *'
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - run: npm run check
        env:
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}

      - name: Commit updated state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add state.json
          if git diff --staged --quiet; then
            echo "No state changes"
          else
            git commit -m "Update state [skip ci]"
            git push
          fi

      - name: Notify ntfy on failure
        if: failure()
        run: |
          curl -sS \
            -H "Title: South HS watcher FAILED" \
            -H "Priority: high" \
            -H "Tags: warning" \
            -H "Click: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            -d "Run ${{ github.run_id }} failed. Tap to view logs." \
            https://ntfy.sh/${{ secrets.NTFY_TOPIC }}
